<nav class="sticky top-0 z-10 flex w-full border-b border-gray-200 bg-white">
  @for (tab of tabs; track tab.route) {
    <a
      [routerLink]="tab.route"
      routerLinkActive="border-blue-500 text-blue-600"
      class="border-b-2 border-transparent px-4 py-3 text-sm font-medium text-gray-500 hover:border-gray-300 hover:text-gray-700"
    >
      {{ tab.name }}
    </a>
  }
</nav>
